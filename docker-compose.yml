services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docto-backend
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docto-frontend
    environment:
      - VITE_API_URL=http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: docto-admin
    environment:
      - VITE_API_URL=http://localhost:4000/api
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped
